<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="index.css">
    <!-- <link rel="stylesheet" href="appbackground.css"> -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
</head>

<body class="rainy-theme">
    <div class="app-root">
        <div class="wrapper-container">
            <div class="video-wrapper">
                <video class="bg-video sunny-video" autoplay muted loop playsinline preload="auto">
                    <source src="videos/sunny.mp4" type="video/mp4">
                </video>
                <video class="bg-video rainy-video" autoplay muted loop playsinline preload="auto">
                    <source src="videos/rainy.mp4" type="video/mp4">
                </video>
                <video class="bg-video cloudy-video" autoplay muted loop playsinline preload="auto">
                    <source src="videos/cloudy.mp4" type="video/mp4">
                </video>
                <video class="bg-video snowy-video" autoplay muted loop playsinline preload="auto">
                    <source src="videos/snowy.mp4" type="video/mp4">
                </video>
                <video class="bg-video thunder-video" autoplay muted loop playsinline preload="auto">
                    <source src="videos/thunder.mp4" type="video/mp4">
                </video>
            </div>

            <div class="left-panel">
                <div class="search-section">
                    <input type="text" placeholder="Search for place..." id="search-input" class="search-input">
                    <div class="errormsg" id="errormsg"></div>
                    <button class="search-btn" id="search-btn">search</button>
                </div>
                <div class="display-weather">
                    <div class="current-date" id="current-date">Monday, March 16</div>
                    <div class="city-name" id="city-name">Chakradharpur</div>
                    <div class="display-icon">
                        <img class="weather-icon" id="weather-icon" src="" alt="Weather icon">
                    </div>
                    <div class="weather-temperature" id="weather-temperature">--°C</div>
                    <div class="weather-condition">Clear sky</div>
                    <div class="feels-like" id="feels-like">--°C</div>
                </div>
                <div class="city-map-container">
                    <h5 class="city-map-title">City map</h5>
                    <div class="city-map" id="city-map"></div>
                </div>
            </div>

            <div class="right-panel">
                <section class="today-highlights">
                    <h5>Today's Highlights</h5>

                    <div class="highlight-grid">
                        <div class="highlight-card">
                            <div class="card-name">UV Index</div>
                            <div class="card-value" id="uv-index">--</div>
                            <div class="uv-status" id="uv-status">--</div>
                        </div>
                        <div class="highlight-card">
                            <div class="card-name">Wind status</div>
                            <div class="card-value" id="wind-status">--km/h</div>
                            <div class="wind-status-text" id="wind-status-text">--</div>
                        </div>
                        <div class="highlight-card">
                            <div class="card-name">Sunrise & Sunset</div>
                            <div class="card-value sunrise-time" id="sunrise-time">--AM/PM</div>
                            <div class="card-value sunset-time" id="sunset-time"></div>
                        </div>
                        <div class="highlight-card">
                            <div class="card-name">Humidity</div>
                            <div class="card-value" id="humidity">--%</div>
                            <div class="humidity-status" id="humidity-status"></div>

                        </div>
                        <div class="highlight-card">
                            <div class="card-name">Visibility</div>
                            <div class="card-value" id="visibility">--km</div>
                            <div class="visibility-status" id="visibility-status"></div>
                        </div>
                        <div class="highlight-card">
                            <div class="card-name">Air Quality</div>
                            <div class="card-value" id="air-quality">--</div>
                            <div class="air-quality-status" id="air-quality-status"></div>
                        </div>
                    </div>
                </section>

                <section class="five-days-forecast">
                    <h5>5-days Forecast</h5>
                    <div class="forecast-container" id="forecast-container">

                    </div>
                </section>
            </div>
        </div>
    </div>

    <script src="index.js"></script>
</body>

</html>
